<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stock Market Explainer — Design System Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  :root {
    --font-inter: 'Inter';
    --font-jetbrains-mono: 'JetBrains Mono';
  }
  html, body { margin: 0; padding: 0; }
  body {
    background: rgb(11 14 20);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 32px; }
  .mono { font-family: var(--font-jetbrains-mono), ui-monospace, monospace; font-variant-numeric: tabular-nums; }

  /* layout grid for component cards */
  .grid { display: grid; gap: 20px; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  @media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: rgb(20 25 34);
    border: 1px solid rgb(30 37 48);
    border-radius: 14px;
    overflow: hidden;
  }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid rgb(30 37 48);
  }
  .card-body { padding: 22px 18px; }

  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 11px; border-radius: 999px;
    border: 1px solid rgb(35 42 54);
    font-size: 12px; letter-spacing: 0.01em;
    color: rgb(138 148 166);
  }
  .dot { width: 8px; height: 8px; border-radius: 999px; display: inline-block; }

  /* component SVGs are className="w-full" — constrain their box */
  .chartbox { width: 100%; }
  .chartbox svg { display: block; width: 100%; height: auto; }

  a.src { color: rgb(139 124 246); text-decoration: none; }
  a.src:hover { text-decoration: underline; }

  .pickbtn {
    font-family: var(--font-jetbrains-mono), monospace;
    font-size: 12px; cursor: pointer;
    background: rgb(27 33 44); color: rgb(232 237 244);
    border: 1px solid rgb(35 42 54); border-radius: 8px;
    padding: 7px 12px;
  }
  .pickbtn:hover { border-color: rgb(139 124 246); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="_ds_bundle.js"></script>

  <script type="text/babel">
    const { CandleAnatomy, EquityCurve, PatternChart, PayoffDiagram } = window.StocksDS;

    // ---- token colors (dark theme) ----
    const C = {
      ink: 'rgb(232 237 244)', muted: 'rgb(138 148 166)', faint: 'rgb(90 99 118)',
      up: 'rgb(43 209 126)', down: 'rgb(255 92 92)', learn: 'rgb(139 124 246)', streak: 'rgb(245 166 35)',
      hair: 'rgb(30 37 48)',
    };

    function Section({ id, n, eyebrow, title, blurb, children }) {
      return (
        <section id={id} style={{ marginTop: 64 }}>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginBottom: 6 }}>
            <span className="mono" style={{ color: C.faint, fontSize: 13 }}>{n}</span>
            <span className="mono" style={{ color: C.learn, fontSize: 12, letterSpacing: '0.08em', textTransform: 'uppercase' }}>{eyebrow}</span>
          </div>
          <h2 style={{ margin: '0 0 8px', color: C.ink, fontSize: 26, fontWeight: 600, letterSpacing: '-0.01em' }}>{title}</h2>
          <p style={{ margin: '0 0 24px', color: C.muted, fontSize: 15, lineHeight: 1.55, maxWidth: 640 }}>{blurb}</p>
          {children}
        </section>
      );
    }

    function Card({ label, side, children }) {
      return (
        <div className="card">
          {(label || side) && (
            <div className="card-head">
              <span style={{ color: C.ink, fontSize: 14, fontWeight: 500 }}>{label}</span>
              {side && <span className="mono" style={{ color: C.faint, fontSize: 12 }}>{side}</span>}
            </div>
          )}
          <div className="card-body"><div className="chartbox">{children}</div></div>
        </div>
      );
    }

    // ---- interactive PatternChart trainer ----
    // build a series where one candle is a clear hammer (long lower wick, small body up high)
    function trainerCandles() {
      const c = [];
      let p = 100;
      for (let i = 0; i < 9; i++) {
        const open = p;
        const close = open - 1.4 - Math.random() * 0.6; // gentle downtrend
        const high = Math.max(open, close) + 0.5;
        const low = Math.min(open, close) - 0.6;
        c.push({ open, high, low, close });
        p = close;
      }
      // the hammer at index 9: small body near top, long lower wick — reversal signal
      const open = p;
      const close = open + 0.4;
      const high = Math.max(open, close) + 0.4;
      const low = Math.min(open, close) - 4.2;
      c.push({ open, high, low, close });
      // confirmation up candle
      c.push({ open: close, high: close + 2.4, low: close - 0.3, close: close + 2.1 });
      return c;
    }

    function Trainer() {
      const [candles] = React.useState(trainerCandles);
      const [picked, setPicked] = React.useState(undefined);
      const correctIndex = candles.length - 2; // the hammer
      const done = picked !== undefined;
      const right = picked === correctIndex;
      return (
        <div className="card">
          <div className="card-head">
            <span style={{ color: C.ink, fontSize: 14, fontWeight: 500 }}>Interactive · Spot the reversal</span>
            <span className="mono" style={{ color: C.faint, fontSize: 12 }}>onPick · picked · correctIndex</span>
          </div>
          <div className="card-body">
            <p style={{ margin: '0 0 16px', color: C.muted, fontSize: 14, lineHeight: 1.5 }}>
              Click the candle that signals a bullish reversal — a <span style={{ color: C.ink }}>hammer</span>:
              small body near the top with a long lower wick.
            </p>
            <div className="chartbox">
              <PatternChart candles={candles} picked={picked} correctIndex={done ? correctIndex : undefined} onPick={(i) => !done && setPicked(i)} />
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginTop: 16, minHeight: 34 }}>
              {!done && <span className="mono" style={{ color: C.faint, fontSize: 13 }}>Tap a candle to answer…</span>}
              {done && (
                <span className="mono" style={{ fontSize: 13, color: right ? C.up : C.down }}>
                  {right ? '✓ Correct — that\'s the hammer.' : '✗ Not quite — the green box marks the hammer.'}
                </span>
              )}
              {done && <button className="pickbtn" onClick={() => setPicked(undefined)}>Reset</button>}
            </div>
          </div>
        </div>
      );
    }

    function Legend() {
      const items = [
        ['up', C.up, '▲ Up / gains'],
        ['down', C.down, '▼ Down / losses'],
        ['learn', C.learn, 'Learn / accent'],
        ['streak', C.streak, 'Streak / reward'],
      ];
      return (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, marginTop: 28 }}>
          {items.map(([k, col, lbl]) => (
            <span className="chip" key={k}>
              <span className="dot" style={{ background: col }}></span>
              <span style={{ color: C.ink }}>{lbl}</span>
              <span className="mono" style={{ color: C.faint, marginLeft: 2 }}>{k}</span>
            </span>
          ))}
        </div>
      );
    }

    function App() {
      return (
        <div className="bg-canvas text-ink font-sans">
          {/* hero */}
          <div style={{ borderBottom: `1px solid ${C.hair}`, paddingTop: 80, paddingBottom: 56 }}>
            <div className="wrap">
              <div className="mono" style={{ color: C.learn, fontSize: 13, letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 18 }}>
                Stock Market Explainer · Design System
              </div>
              <h1 style={{ margin: 0, color: C.ink, fontSize: 52, fontWeight: 700, letterSpacing: '-0.02em', lineHeight: 1.05, maxWidth: 820 }}>
                Four SVG charts that teach the market.
              </h1>
              <p style={{ margin: '20px 0 0', color: C.muted, fontSize: 18, lineHeight: 1.55, maxWidth: 600 }}>
                A dependency-free chart kit for a finance-education app. Pure SVG, semantic color tokens,
                dark by default. Here's the whole system on one page.
              </p>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, marginTop: 28 }}>
                <span className="chip">4 components</span>
                <span className="chip">Pure SVG · zero deps</span>
                <span className="chip">Token-driven theme</span>
              </div>
              <Legend />
            </div>
          </div>

          <div className="wrap" style={{ paddingBottom: 100 }}>
            <Section id="anatomy" n="01" eyebrow="CandleAnatomy" title="Anatomy of a candlestick"
              blurb="A fixed, labeled teaching diagram — the vocabulary every other chart depends on. Open, close, the body, and the high/low wicks.">
              <Card label="Default" side="no props">
                <CandleAnatomy />
              </Card>
            </Section>

            <Section id="equity" n="02" eyebrow="EquityCurve" title="Equity curve"
              blurb="A portfolio's value indexed to 100. The line turns green when it ends above its start, red when below — with a dashed break-even line at 100.">
              <div className="grid grid-3">
                <Card label="Up" side="ends +18">
                  <EquityCurve equity={[100, 101, 103, 102, 105, 108, 107, 110, 114, 113, 118]} />
                </Card>
                <Card label="Down" side="ends −14">
                  <EquityCurve equity={[100, 99, 101, 98, 96, 97, 93, 94, 90, 88, 86]} />
                </Card>
                <Card label="Volatile" side="ends +3">
                  <EquityCurve equity={[100, 106, 97, 109, 92, 104, 88, 101, 95, 112, 103]} />
                </Card>
              </div>
            </Section>

            <Section id="patterns" n="03" eyebrow="PatternChart" title="Candlestick patterns"
              blurb="Auto-scaled OHLC candles — green up, red down, with wicks. Static for illustration, or wired up as a clickable trainer where learners guess the pattern.">
              <div className="grid grid-3" style={{ marginBottom: 20 }}>
                <Card label="Bullish engulfing" side="reversal ▲">
                  <PatternChart candles={[
                    { open: 100, high: 101, low: 97, close: 97.5 },
                    { open: 97.5, high: 98, low: 94.5, close: 95 },
                    { open: 95, high: 95.5, low: 92.5, close: 93 },
                    { open: 92.6, high: 99.5, low: 92.2, close: 99 },
                    { open: 99, high: 102.5, low: 98.6, close: 101.8 },
                  ]} />
                </Card>
                <Card label="Hammer" side="reversal ▲">
                  <PatternChart candles={[
                    { open: 100, high: 100.5, low: 98, close: 98.4 },
                    { open: 98.4, high: 98.8, low: 96, close: 96.4 },
                    { open: 96.4, high: 96.8, low: 94.5, close: 95 },
                    { open: 95, high: 95.6, low: 90.5, close: 95.3 },
                    { open: 95.4, high: 98.2, low: 95.1, close: 97.9 },
                  ]} />
                </Card>
                <Card label="Doji" side="indecision">
                  <PatternChart candles={[
                    { open: 96, high: 97, low: 95.6, close: 96.8 },
                    { open: 96.8, high: 98.2, low: 96.5, close: 98 },
                    { open: 98, high: 99.6, low: 97.8, close: 98.02 },
                    { open: 98, high: 98.6, low: 96.4, close: 96.8 },
                    { open: 96.8, high: 97.2, low: 94.5, close: 95 },
                  ]} />
                </Card>
              </div>
              <Trainer />
            </Section>

            <Section id="payoff" n="04" eyebrow="PayoffDiagram" title="Options payoff at expiration"
              blurb="Profit and loss across the price spectrum for any combination of legs — calls, puts, stock. Profit zones fill green, losses red, with break-evens and strikes marked.">
              <div className="grid grid-2">
                <Card label="Long call" side="strike 100 @ $5">
                  <PayoffDiagram title="Long call · strike 100 @ $5"
                    legs={[{ instrument: 'call', side: 'long', strike: 100, premium: 5, qty: 1 }]} />
                </Card>
                <Card label="Bull call spread" side="100 / 110">
                  <PayoffDiagram title="Bull call spread · 100/110"
                    legs={[
                      { instrument: 'call', side: 'long', strike: 100, premium: 5, qty: 1 },
                      { instrument: 'call', side: 'short', strike: 110, premium: 2, qty: 1 },
                    ]} />
                </Card>
                <Card label="Long straddle" side="strike 100">
                  <PayoffDiagram title="Long straddle · strike 100"
                    legs={[
                      { instrument: 'call', side: 'long', strike: 100, premium: 5, qty: 1 },
                      { instrument: 'put', side: 'long', strike: 100, premium: 5, qty: 1 },
                    ]} />
                </Card>
                <Card label="Covered call" side="stock 100 · short call 110">
                  <PayoffDiagram title="Covered call · short 110 @ $3"
                    legs={[
                      { instrument: 'stock', side: 'long', premium: 100, qty: 100 },
                      { instrument: 'call', side: 'short', strike: 110, premium: 3, qty: 1 },
                    ]} />
                </Card>
              </div>
            </Section>

            {/* footer */}
            <div style={{ marginTop: 72, paddingTop: 28, borderTop: `1px solid ${C.hair}`, display: 'flex', flexWrap: 'wrap', justifyContent: 'space-between', gap: 12 }}>
              <span className="mono" style={{ color: C.faint, fontSize: 13 }}>StocksDS · stock-market-explainer-web@0.1.0</span>
              <span className="mono" style={{ color: C.faint, fontSize: 13 }}>window.StocksDS.{'{ CandleAnatomy, EquityCurve, PatternChart, PayoffDiagram }'}</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
