<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Stax App Screen" description="Starter app screen on the Stax UI kit — themed nav shell, cards, buttons, charts. Light/dark." -->
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <script src="./ds-base.js"></script>
</helmet>

<x-import component-from-global-scope="StaxKit.AppShell" from="./stax-kit.jsx" tab="dashboard" theme="{{ theme }}" set-theme="{{ setTheme }}" go="{{ go }}" hint-size="100%,640px">
  <div style="display:grid; grid-template-columns:1fr 320px; gap:22px; align-items:start;">

    <div style="display:flex; flex-direction:column; gap:22px;">
      <!-- hero (fixed brand gradient — reads on both themes) -->
      <div style="border-radius:26px; padding:26px; color:#fff; display:flex; align-items:center; gap:24px; background:linear-gradient(120deg, #2E7BE6, #6BA6F5); box-shadow:0 12px 30px rgba(46,123,230,.28);">
        <x-import component-from-global-scope="StaxKit.Ring" from="./stax-kit.jsx" size="{{ ringSize }}" stroke="{{ ringStroke }}" pct="{{ ringPct }}" color="#fff" track="rgba(255,255,255,.28)" hint-size="92px,92px">
          <div style="font-weight:800; font-size:22px;">60%</div>
        </x-import>
        <div style="flex:1;">
          <div style="font-size:13px; font-weight:700; opacity:.85; margin-bottom:4px;">CONTINUE · UNIT 2 · CHART PATTERNS</div>
          <div style="font-size:26px; font-weight:800; letter-spacing:-.02em; margin-bottom:6px;">Reading candlesticks</div>
          <div style="font-size:14px; opacity:.9; font-weight:600; margin-bottom:16px;">Nice work — you're 3 lessons from levelling up.</div>
          <x-import component-from-global-scope="StaxKit.Btn" from="./stax-kit.jsx" kind="white" icon-right="arrow-right" hint-size="170px,44px">Continue learning</x-import>
        </div>
      </div>

      <!-- lessons -->
      <div>
        <x-import component-from-global-scope="StaxKit.SectionTitle" from="./stax-kit.jsx" action="See all units" hint-size="100%,30px">Your path</x-import>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <x-import component-from-global-scope="StaxKit.LessonCard" from="./stax-kit.jsx" title="Market basics" sub="5 lessons" icon="sprout" state="done" pct="{{ p100 }}" tint="{{ tintGreen }}" hint-size="100%,150px"></x-import>
          <x-import component-from-global-scope="StaxKit.LessonCard" from="./stax-kit.jsx" title="Spotting reversals" sub="4 of 7 lessons" icon="activity" state="active" pct="{{ p57 }}" tint="{{ tintBlue }}" hint-size="100%,150px"></x-import>
          <x-import component-from-global-scope="StaxKit.LessonCard" from="./stax-kit.jsx" title="Options payoffs" sub="5 lessons" icon="git-branch" state="locked" pct="{{ p0 }}" tint="{{ tintLock }}" hint-size="100%,150px"></x-import>
          <x-import component-from-global-scope="StaxKit.LessonCard" from="./stax-kit.jsx" title="Build a portfolio" sub="8 lessons" icon="wallet" state="locked" pct="{{ p0 }}" tint="{{ tintLock }}" hint-size="100%,150px"></x-import>
        </div>
      </div>
    </div>

    <!-- right column (text inherits A.ink from AppShell; muted/green use kit hexes) -->
    <div style="display:flex; flex-direction:column; gap:18px;">
      <x-import component-from-global-scope="StaxKit.Card" from="./stax-kit.jsx" hint-size="100%,170px">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
          <span style="font-weight:800; font-size:15px;">This week</span>
          <x-import component-from-global-scope="StaxKit.Pill" from="./stax-kit.jsx" icon="flame" bg="{{ amberSoft }}" fg="{{ amberInk }}" hint-size="70px,28px">12</x-import>
        </div>
        <x-import component-from-global-scope="StaxKit.WeekDots" from="./stax-kit.jsx" days="{{ week }}" on="{{ amber }}" off="{{ barTrack }}" txt="{{ faint }}" today="{{ today }}" hint-size="100%,60px"></x-import>
      </x-import>

      <x-import component-from-global-scope="StaxKit.Card" from="./stax-kit.jsx" hint-size="100%,200px">
        <div style="font-weight:800; font-size:15px; margin-bottom:4px;">Practice portfolio</div>
        <div style="font-size:13px; color:#8E8A95; font-weight:600; margin-bottom:10px;">Your paper trades, this month</div>
        <x-import component-from-global-scope="StocksDS.EquityCurve" equity="{{ equity }}" hint-size="100%,120px"></x-import>
        <div style="display:flex; justify-content:space-between; margin-top:12px;">
          <span style="font-size:13px; color:#8E8A95; font-weight:600;">Total return</span>
          <span style="font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; color:#1FA968;">+21.0%</span>
        </div>
      </x-import>
    </div>

  </div>
</x-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:680}}">
class Component extends DCLogic {
  state = { theme: 'light' };
  renderVals() {
    const K = window.StaxKit;
    // keep the live kit palette in sync with this template's theme
    if (K) K.applyTheme(this.state.theme);
    const A = (K && K.A) || {};
    return {
      theme: this.state.theme,
      setTheme: (t) => this.setState({ theme: t }),
      go: () => {},
      // numbers (must come through props as raw values, not strings)
      ringSize: 92, ringStroke: 10, ringPct: 0.6,
      p100: 100, p57: 57, p0: 0, today: 4,
      // component-prop holes (allowed — these feed kit props, not inline styles)
      amber: A.amber, amberSoft: A.amberSoft, amberInk: A.amberInk, barTrack: A.barTrack, faint: A.faint,
      tintGreen: { bg: A.greenSoft, fg: A.green },
      tintBlue: { bg: A.primarySoft, fg: A.primary },
      tintLock: { bg: A.sunk, fg: A.faint },
      week: [{ l: 'M', done: true }, { l: 'T', done: true }, { l: 'W', done: true }, { l: 'T', done: true }, { l: 'F', done: false }, { l: 'S', done: false }, { l: 'S', done: false }],
      equity: [100, 102, 101, 104, 103, 107, 111, 110, 114, 118, 121],
    };
  }
}
</script>
</body>
</html>
